<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>

<main class="container">
    <div class="d-flex align-items-center mb-4">
        <h1 class="me-3">Historial de Movimientos</h1>
    </div>

    <section class="panel mb-5" style="border-left: 5px solid #28a745;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0 text-success">Pila de Devoluciones (Últimas primero)</h2>
            <small class="text-muted">Estructura Stack</small>
        </div>
        <div class="table-wrap">
            <table class="table-sm">
                <thead class="table-dark">
                <tr>
                    <th>Usuario</th>
                    <th>Fecha y Hora</th>
                    <th>Título del Libro</th>
                    <th>Estado Final</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="linea : ${pilaDevoluciones}">
                    <td th:text="${#strings.arraySplit(linea, '|')[0]}"></td>
                    <td th:text="${#strings.arraySplit(linea, '|')[1]}"></td>
                    <td th:text="${#strings.arraySplit(linea, '|')[2]}"></td>
                    <td><span class="badge bg-success">DEVOLUCIÓN</span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="panel" style="border-left: 5px solid #3498db;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0 text-primary">Registro Cronológico de Préstamos</h2>
            <small class="text-muted">Estructura Queue</small>
        </div>
        <div class="table-wrap">
            <table class="table-sm">
                <thead class="table-dark">
                <tr>
                    <th>Usuario</th>
                    <th>Fecha y Hora</th>
                    <th>Título del Libro</th>
                    <th>Estado Final</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="linea : ${colaPrestamos}">
                    <td th:text="${#strings.arraySplit(linea, '|')[0]}"></td>
                    <td th:text="${#strings.arraySplit(linea, '|')[1]}"></td>
                    <td th:text="${#strings.arraySplit(linea, '|')[2]}"></td>
                    <td><span class="badge bg-primary">PRÉSTAMO</span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
