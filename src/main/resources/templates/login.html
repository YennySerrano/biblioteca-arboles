<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión — Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
<div class="login-card">
    
    <div style="
        width: 150px; 
        height: 150px; 
        border-radius: 50%; 
        overflow: hidden; 
        margin: 0 auto 15px auto; 
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid #eee; /* Borde sutil para la bola */
        position: relative;
    ">
        <img th:src="@{/images/Logo.png}" alt="Logo Biblioteca" 
             style="
                width: 200%; /* ZOOM EXTREMO: Hace que el logo se vea mucho más cerca */
                height: auto; 
                display: block; 
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%); 
                mix-blend-mode: multiply;
             ">
    </div>

    <h1>Biblioteca</h1>
    <p class="login-sub">Inicio de sesión</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
        
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        
        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>
</div>
</body>
</html>
